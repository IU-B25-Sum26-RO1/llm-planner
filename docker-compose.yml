services:
  audio_processor:
    build: .
    image: llm_planner_image:latest
    container_name: audio_processor_container

    # devices:
    #   - /dev/snd:/dev/snd

    network_mode: "host"
    ipc: host

    environment:
      - VOSK_MODEL=${VOSK_MODEL}
      - AUDIO_SAMPLERATE=${AUDIO_SAMPLERATE}
      - AUDIO_BLOCK_SIZE=${AUDIO_BLOCK_SIZE}

      - PULSE_SERVER=${PULSE_SERVER}
      - AUDIO_DEVICE=${AUDIO_DEVICE}
      # - XDG_RUNTIME_DIR=/tmp
      # - PULSE_COOKIE=/tmp/pulse-cookie-dir/cookie
    volumes:
      - /dev/shm:/dev/shm
      - ${HOST_VOSK_MODELS_PATH}:/workspace/models
      - ./src:/workspace/src

      # - ${HOST_PULSE_SOCKET_PATH:-/run/user/1000/pulse}:/tmp/pulse
      - /mnt/wslg/PulseServer:/mnt/wslg/PulseServer

      - ./asound.conf:/etc/asound.conf:ro
      # - ./pulse-client.conf:/etc/pulse/client.conf:ro
    group_add:
      - audio
    restart: unless-stopped
    command: bash -c "source /opt/ros/humble/setup.bash && source /workspace/install/setup.bash && ros2 run audio_processor audio_processor"

  decomposer:
    image: llm_planner_image:latest
    container_name: decomposer_container
    depends_on:
      - audio_processor
      - simulation
      - ur10e_control
    
    network_mode: "host"
    ipc: host
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

    environment:
      - LLM_API_URL=${LLM_API_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - SYS_PROMPT_PATH=${SYS_PROMPT_PATH}
    volumes:
      - /dev/shm:/dev/shm
      - ./src:/workspace/src
      - ./schemas:/workspace/schemas
      - ./prompts:/workspace/prompts
    command: bash -c "source /opt/ros/humble/setup.bash && source /workspace/install/setup.bash && ros2 run decomposer decomposer"
    restart: unless-stopped

    
  simulation:
    image: llm_planner_image:latest
    container_name: simulation_container

    privileged: true

    devices:
      - /dev/dxg:/dev/dxg

    network_mode: "host"
    ipc: host

    environment:
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-wayland-0}
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
      - MESA_D3D12_DEFAULT_ADAPTER_NAME=${MESA_D3D12_DEFAULT_ADAPTER_NAME:-NVIDIA}
      - LIBGL_ALWAYS_SOFTWARE=${LIBGL_ALWAYS_SOFTWARE:-1}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

      - TARGET_VIDEO_FPS=${TARGET_VIDEO_FPS}
      - TARGET_VIDEO_WIDTH=${TARGET_VIDEO_WIDTH}
      - TARGET_VIDEO_HEIGHT=${TARGET_VIDEO_HEIGHT}

    volumes:
      - /dev/shm:/dev/shm
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /usr/lib/wsl:/usr/lib/wsl:ro
      - /mnt/wslg:/mnt/wslg
      - ./src:/workspace/src

    command: >-
      bash -c "mkdir -p /tmp/runtime-root && chmod 700 /tmp/runtime-root &&
      source /opt/ros/humble/setup.bash && source /workspace/install/setup.bash &&
      if [ \"$${LIBGL_ALWAYS_SOFTWARE}\" = \"1\" ]; then
        xvfb-run -a -s '-screen 0 1920x1080x24' ros2 launch /workspace/src/ur10e_scene/launch/start_scene.launch.py;
      else
        ros2 launch /workspace/src/ur10e_scene/launch/start_scene.launch.py;
      fi"
  sam3_preprocessor:
    image: llm_planner_image:latest
    container_name: sam3_preprocessor_container
    depends_on:
      - simulation
    
    network_mode: "host"
    ipc: host

    environment:
      - CAMERA_RAW_TOPIC=${CAMERA_RAW_TOPIC}
      - TARGET_VIDEO_FPS=${TARGET_VIDEO_FPS}
      - TARGET_VIDEO_WIDTH=${TARGET_VIDEO_WIDTH}
      - TARGET_VIDEO_HEIGHT=${TARGET_VIDEO_HEIGHT}

    volumes:
      - /dev/shm:/dev/shm
      - ./src:/workspace/src
    
    command: bash -c "source /opt/ros/humble/setup.bash && source /workspace/install/setup.bash && ros2 run sam3_preprocessor preprocessor"

  sam3_bridge:
    image: llm_planner_image:latest
    container_name: sam3_bridge_container
    depends_on:
      - sam3_preprocessor
    
    network_mode: "host"
    ipc: host

    environment:
      - SAM3_SERVER_URL=${SAM3_SERVER_URL}
    
    volumes:
      - /dev/shm:/dev/shm
      - ./src:/workspace/src

    command: bash -c "source /opt/ros/humble/setup.bash && source /workspace/install/setup.bash && ros2 run sam3_bridge bridge"

  ur10e_control:
    image: llm_planner_image:latest
    container_name: control_container
    depends_on:
      - audio_processor
      # - decomposer
      # - simulation
    
    network_mode: "host"
    ipc: host

    volumes:
      - /dev/shm:/dev/shm
      - ./src:/workspace/src

    command: bash -c "source /opt/ros/humble/setup.bash && source /workspace/install/setup.bash && ros2 run ur10e_control_system task_manager && ros2 run ur10e_control_system ur10e_interface"

